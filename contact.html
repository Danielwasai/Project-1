<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="style.css">

<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Hello World home">
        <span class="brand-mark">HW</span>
        <span>Hello World</span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>

      </nav>
    </header>

    <main>
      <section class="panel">
        <div class="sparkle" aria-hidden="true"></div>
        <p class="eyebrow">Say hello</p>
        <h1 class="page-title">Contact <span>Us</span></h1>
        <p class="lead">Pick a path and send a note. This page is ready for real contact details whenever you want to swap the placeholders for the good stuff.</p>

        <div class="contact-list">
          <a class="contact-link" href="mailto:hello@example.com">
            <span>Email</span>
            <b>hello@example.com</b>
          </a>
          <a class="contact-link" href="tel:+10000000000">
            <span>Phone</span>
            <b>+1 000 000 0000</b>
          </a>
          <a class="contact-link" href="index.html">
            <span>Return</span>
            <b>Back home</b>
          </a>
        </div>
