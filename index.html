<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fafc;
      --muted: #b7c0d8;
      --aqua: #5eead4;
      --coral: #fb7185;
      --gold: #fbbf24;
      --night: #10131f;
      --deep: #171a2b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 18%, rgba(94, 234, 212, 0.18), transparent 28rem),
        radial-gradient(circle at 82% 76%, rgba(251, 113, 133, 0.16), transparent 26rem),
        linear-gradient(135deg, var(--night), var(--deep) 48%, #0f172a);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, black, transparent 72%);
    }

    main {
      width: min(92vw, 780px);
      padding: clamp(2rem, 6vw, 5rem);
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.62);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(24px);
      isolation: isolate;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 14px;
      z-index: -1;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      margin: 0 0 1.35rem;
      color: var(--aqua);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 0.65rem;
      height: 0.65rem;
      border-radius: 999px;
      background: var(--gold);
      box-shadow: 0 0 24px rgba(251, 191, 36, 0.9);
    }

    h1 {
      margin: 0;
      max-width: 9ch;
      font-size: clamp(4rem, 14vw, 8.6rem);
      line-height: 0.84;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, var(--aqua), var(--ink) 44%, var(--coral));
      -webkit-background-clip: text;
      background-clip: text;
      filter: drop-shadow(0 18px 34px rgba(94, 234, 212, 0.18));
    }

    p {
      max-width: 34rem;
      margin: 1.6rem 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.3vw, 1.25rem);
      line-height: 1.7;
    }

    .sparkle {
      position: absolute;
      right: clamp(1.4rem, 5vw, 4rem);
      top: clamp(1.4rem, 5vw, 3.5rem);
      width: 4.5rem;
      height: 4.5rem;
      color: var(--gold);
      animation: spin 9s linear infinite;
    }

    .sparkle::before,
    .sparkle::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      width: 100%;
      height: 0.28rem;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 28px rgba(251, 191, 36, 0.7);
    }

    .sparkle::after {
      transform: rotate(90deg);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 560px) {
      main {
        padding-top: 5.2rem;
      }

      .sparkle {
        width: 3rem;
        height: 3rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="sparkle" aria-hidden="true"></div>
    <p class="eyebrow">First light</p>
    <h1>Hello <span>World</span></h1>
    <p>A tiny page with a bit of polish: glass, glow, crisp type, and just enough motion to make the classic greeting feel dressed for the occasion.</p>
  </main>
</body>
</html>
